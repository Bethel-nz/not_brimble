root = "."
tmp_dir = "tmp/api"

[build]
cmd = "go build -o ./tmp/api/main ./cmd/api"
entrypoint = "tmp/api/main"
include_ext = ["go"]
exclude_dir = ["tmp", "web", "docs", ".claude", ".git", "node_modules"]
delay = 500
kill_delay = "2s"
stop_on_error = true
send_interrupt = true

[log]
time = false

[misc]
clean_on_exit = true
